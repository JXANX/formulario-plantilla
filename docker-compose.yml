version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: electoral-postgres
    environment:
      POSTGRES_DB: testigos_electorales
      POSTGRES_USER: electoral
      POSTGRES_PASSWORD: electoral2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electoral -d testigos_electorales"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: electoral-backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/testigos_electorales
      - DB_USERNAME=electoral
      - DB_PASSWORD=electoral2026
      - CORS_ORIGINS=http://localhost:5173,http://localhost
    volumes:
      - ./backend/exports:/app/exports
      - ./backend/logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electoral-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
